version: '3.8'

services:
    # Python Backend
    meta-api:
      build:
        context: ./meta
        dockerfile: Dockerfile
      image: wtech-meta-api:latest
      networks:
        - hidro
      volumes:
        - meta_accounts:/app/accounts.json
        - meta_settings:/app/settings.json
        - meta_memory:/app/memory
      deploy:
        replicas: 1
        restart_policy:
          condition: on-failure
        labels:
          - "traefik.enable=true"
          - "traefik.http.routers.wtech2-api.rule=Host(`site2.w-techbrasil.com.br`) && PathPrefix(`/api`)"
          - "traefik.http.routers.wtech2-api.entrypoints=websecure"
          - "traefik.http.routers.wtech2-api.tls.certresolver=letsencryptresolver"
          - "traefik.http.services.wtech2-api.loadbalancer.server.port=5000"
          - "traefik.http.routers.wtech2-api.priority=2"
          - "traefik.docker.network=hidro"

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/api
    image: wtech-frontend:latest
    networks:
      - hidro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.wtech2-frontend.rule=Host(`site2.w-techbrasil.com.br`)"
        - "traefik.http.routers.wtech2-frontend.entrypoints=websecure"
        - "traefik.http.routers.wtech2-frontend.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.wtech2-frontend.loadbalancer.server.port=80"
        - "traefik.http.routers.wtech2-frontend.priority=1"
        - "traefik.docker.network=hidro"

networks:
  hidro:
    external: true

volumes:
  meta_accounts:
  meta_settings:
  meta_memory:
