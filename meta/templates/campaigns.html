{% extends "base.html" %}

{% block title %}Campanhas - Meta Ads AI{% endblock %}

{% block content %}
<div class="flex-between">
    <div>
        <h1>Gestão de Campanhas</h1>
        <h3 class="text-muted">Desempenho atual e automações da IA em <span style="color: var(--primary)">{{ account_name }}</span></h3>
    </div>
    <div class="flex-between" style="margin-bottom: 24px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <select class="form-control" id="statusFilter" onchange="loadCampaigns()" style="width: auto;">
                <option value="ACTIVE">Ativas</option>
                <option value="PAUSED">Pausadas</option>
                <option value="ALL">Todas</option>
            </select>
        </div>
        <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" onclick="autoOptimize()" id="btnOptimize">
                <i data-lucide="sparkles"></i> Auto-Otimizar com IA
            </button>
            <button class="btn btn-primary" onclick="window.location.href='/chat'">
                <i data-lucide="plus"></i> Criar com IA
            </button>
        </div>
    </div>
</div>

<div class="glass-panel" style="padding: 0; overflow: hidden; margin-top: 10px;">
    <div style="overflow-x: auto;">
        <table class="data-table">
            <thead style="background: rgba(0,0,0,0.2);">
                <tr>
                    <th style="width: 40px">ID</th>
                    <th>Campanha</th>
                    <th>Objetivo</th>
                    <th>Status</th>
                    <th>Orçamento</th>
                    <th>Criada Em</th>
                </tr>
            </thead>
            <tbody id="campaignsTbody">
                <tr>
                    <td colspan="6" style="text-align: center; padding: 40px;">
                        <div class="loader" style="display: inline-block; border-color: var(--primary); border-top-color: transparent;"></div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function loadCampaigns() {
        const tbody = document.getElementById('campaignsTbody');
        const status = document.getElementById('statusFilter').value;
        
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px;"><div class="loader" style="display: inline-block; border-color: var(--primary); border-top-color: transparent;"></div></td></tr>`;
        
        try {
            const res = await fetch(`/api/meta/campaigns?status=${status}`);
            const data = await res.json();
            
            if(data.error) {
                tbody.innerHTML = `<tr><td colspan="6" style="color: var(--danger); text-align: center; padding: 24px;">Erro: ${data.error}</td></tr>`;
                return;
            }
            
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; padding: 40px; color: var(--text-muted);">Nenhuma campanha encontrada com status ${status}.</td></tr>`;
                return;
            }
            
            tbody.innerHTML = '';
            
            const formatMoney = (valStr) => {
                if(!valStr) return '-';
                const val = parseFloat(valStr) / 100;
                return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
            };

            data.forEach(camp => {
                const isAct = camp.status === 'ACTIVE';
                const sLabel = isAct ? 'Ativa' : camp.status.charAt(0).toUpperCase() + camp.status.slice(1).toLowerCase();
                const sBadge = isAct ? 'badge-active' : 'badge-paused';
                
                let budgetInfo = '-';
                if(camp.daily_budget) budgetInfo = formatMoney(camp.daily_budget) + ' / dia';
                else if(camp.lifetime_budget) budgetInfo = formatMoney(camp.lifetime_budget) + ' vitalício';

                const tr = document.createElement('tr');
                tr.className = 'hover-row';
                tr.style.cursor = 'pointer';
                tr.onclick = () => window.location.href = `/campaigns/${camp.id}`;
                tr.innerHTML = `
                    <td class="text-muted" style="font-family: monospace; font-size: 0.8rem" title="${camp.id}">...${camp.id.slice(-6)}</td>
                    <td><strong style="color: #fff">${camp.name}</strong></td>
                    <td><span style="font-size: 0.85rem; color: var(--accent); background: rgba(139, 92, 246, 0.1); padding: 4px 8px; border-radius: 4px;">${camp.objective.replace('OUTCOME_', '')}</span></td>
                    <td><span class="badge ${sBadge}">${sLabel}</span></td>
                    <td>${budgetInfo}</td>
                    <td class="text-muted" style="font-size: 0.85rem">${new Date(camp.created_time).toLocaleDateString()}</td>
                `;
                tbody.appendChild(tr);
            });
            
        } catch (err) {
            console.error(err);
            tbody.innerHTML = `<tr><td colspan="6" style="color: var(--danger); text-align: center; padding: 24px;">Falha de comunicação</td></tr>`;
        }
    }
    
    async function autoOptimize() {
        const btn = document.getElementById('btnOptimize');
        const oldHtml = btn.innerHTML;
        btn.innerHTML = `<div class="loader" style="display:block;width:16px;height:16px;border-width:2px;border-color:var(--primary) transparent transparent;"></div> Otimizando (IA)...`;
        btn.disabled = true;

        try {
            const res = await fetch('/api/meta/auto_optimize', { method: 'POST' });
            const data = await res.json();
            
            if(data.success) {
                // Remove some markdown symbols for alert, or render a modal. Simple approach: alert.
                alert("Otimização Concluída!\n\nRelatório da IA:\n" + data.report.slice(0, 500) + "...\n\n(Vá ao 'Agente IA' para detalhes)");
                loadCampaigns();
            } else {
                alert("Erro na auto-otimização: " + data.error);
            }
        } catch(err) {
            alert("Erro de conexão ao otimizar.");
        } finally {
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        }
    }

    // Init
    loadCampaigns();
</script>
{% endblock %}
