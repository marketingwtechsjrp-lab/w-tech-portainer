<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Meta Ads AI{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    {% if not hide_sidebar %}
    <aside class="sidebar">
        <div class="brand">
            <i data-lucide="zap" class="text-primary"></i>
            <span>MetaAds <span class="gradient-text">AI</span></span>
        </div>
        
        {% if slug %}
        <div class="active-profile">
            <div style="font-size: 24px;">{{ profile.icon }}</div>
            <div>
                <div style="font-weight: 600; font-size: 0.9rem;">{{ account_name }}</div>
                <div style="font-size: 0.75rem; color: var(--text-muted)">{{ profile.name }}</div>
            </div>
        </div>
        {% endif %}

        <nav class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <i data-lucide="layout-dashboard"></i> Overview
            </a>
            <a href="{{ url_for('campaigns') }}" class="nav-item {% if request.endpoint == 'campaigns' %}active{% endif %}">
                <i data-lucide="megaphone"></i> Campanhas
            </a>
            <a href="{{ url_for('chat') }}" class="nav-item {% if request.endpoint == 'chat' %}active{% endif %}">
                <i data-lucide="bot"></i> Agente IA
            </a>
            <!-- Link para voltar/trocar conta -->
            <a href="{{ url_for('select_account') }}" class="nav-item" style="margin-top: auto;">
                <i data-lucide="users"></i> Trocar Conta
            </a>
        </nav>
    </aside>
    {% endif %}

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        lucide.createIcons();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
